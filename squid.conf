http_port 3128

# Only api.anthropic.com is reachable. Everything else is denied.
acl anthropic dstdomain api.anthropic.com
acl SSL_ports port 443
acl CONNECT method CONNECT

# Only allow CONNECT tunnels, only to :443, only to the allowed domain.
http_access deny CONNECT !SSL_ports
http_access allow CONNECT anthropic
http_access deny all

cache deny all
# squid drops to the unprivileged `proxy` user, which can only write here.
access_log stdio:/var/log/squid/access.log squid
